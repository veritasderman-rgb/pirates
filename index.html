<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a2630" />
  <link rel="icon" type="image/png" href="/img/icon-192.png" />
  <link rel="apple-touch-icon" href="/img/icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Pirates</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0a2630; color: #cfeef2;
      font-family: "Consolas", "Menlo", monospace; overflow: hidden; touch-action: manipulation; }
    #app { position: relative; height: 100vh; }
    #plot-container { position: absolute; inset: 0; }
    #plot { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; display: block; }

    /* HUD vrstvy */
    #topbar { position: absolute; top: 0; left: 0; right: 0; padding: 5px 10px; z-index: 8;
      display: flex; gap: 16px; align-items: center; font-size: 13px;
      background: linear-gradient(#0a2630e0, #0a263000); pointer-events: none; }
    #topbar > * { pointer-events: auto; }
    .tb-time { color: #eafcff; min-width: 70px; }
    .tb-wind { color: #7fd0e0; }
    .tb-comp button { margin-right: 3px; }

    .hud { position: absolute; z-index: 6; display: flex; flex-direction: column; gap: 6px;
      font-size: 11px; pointer-events: none; }
    .hud > * { pointer-events: auto; }
    #hud-left { top: 34px; left: 8px; width: 250px; }
    #hud-right { top: 34px; right: 8px; width: 240px; }
    #hud-bottom { left: 8px; bottom: 8px; right: 260px; flex-direction: row; flex-wrap: wrap;
      align-items: flex-end; z-index: 7; }
    #hud-log { position: absolute; right: 8px; bottom: 8px; width: 240px; max-height: 34vh;
      overflow-y: auto; z-index: 6; display: flex; flex-direction: column; gap: 2px;
      font-size: 11px; pointer-events: auto; }

    /* navigační pad (posun mapy bez myši) */
    #navpad { position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      z-index: 7; display: grid; grid-template-columns: repeat(3, 34px); grid-auto-rows: 34px;
      gap: 4px; opacity: .85;
      grid-template-areas: ".  up  ." "left center right" ".  down  ." "zin . zout"; }
    #navpad button { padding: 0; font-size: 15px; line-height: 1; background: #07222bd8; }
    #navpad button[data-nav="up"] { grid-area: up; }
    #navpad button[data-nav="left"] { grid-area: left; }
    #navpad button[data-nav="center"] { grid-area: center; color: #7fd0e0; }
    #navpad button[data-nav="right"] { grid-area: right; }
    #navpad button[data-nav="down"] { grid-area: down; }
    #navpad button[data-nav="in"] { grid-area: zin; }
    #navpad button[data-nav="out"] { grid-area: zout; }
    @media (max-width: 720px) { #navpad { top: auto; bottom: 92px; transform: none; } }

    .panel { border: 1px solid #1c4a55; padding: 5px 7px; background: #07222bd0;
      backdrop-filter: blur(2px); }
    .panel h3 { margin: 0 0 4px 0; font-size: 11px; color: #d8c24f; text-transform: uppercase; }
    .row, .row2 { display: flex; justify-content: space-between; gap: 6px; margin: 1px 0; }
    .row2 { font-size: 11px; }
    .subs { display: grid; grid-template-columns: 1fr 1fr; gap: 1px 8px; margin: 4px 0; font-size: 10px; }
    .ship-img { display: block; width: 100%; max-height: 92px; object-fit: cover; object-position: center;
      border: 1px solid #1c4a55; border-radius: 2px; margin: 2px 0 4px; }
    .bar { display: inline-block; width: 70px; height: 8px; background: #0b2a33; border: 1px solid #1c4a55;
      vertical-align: middle; }
    .bar i { display: block; height: 100%; }
    .pos { margin-top: 4px; padding: 2px 4px; border: 1px solid #1c4a55; color: #cfeef2; }
    .pos.good { border-color: #4fd0e0; color: #9ff0ff; }
    .pos.nogo { border-color: #e0603a; color: #ffb090; }

    .ct { padding: 1px 0; }
    .ct.enemy { color: #e0805a; }
    .ct.neutral { color: #d8c24f; }
    .ct.player { color: #4fd0e0; }
    .obj { padding: 1px 0; }
    .obj.done { color: #6fd06a; }
    .obj.failed { color: #e0603a; }
    .hintline { margin: 3px 0; padding: 2px 4px; border-left: 2px solid #d8c24f; color: #d8c24f; font-size: 10px; }
    .hintline.ok { border-color: #6fd06a; color: #9ff0a0; }
    /* předpověď počasí */
    .fc .fc-row { display: grid; grid-template-columns: 54px 20px 48px 1fr; align-items: center; gap: 4px; padding: 1px 0; }
    .fc .fc-a { font-size: 15px; color: #7fd0e0; text-align: center; }
    .fc .fc-t { color: #9fb8bf; }
    .fc .ok { color: #6fd06a; }
    .fc .bad { color: #e0805a; }
    .fc-hint { font-size: 9px; color: #6a8a90; margin-top: 3px; line-height: 1.3; }
    /* taktický telegraf u zaměřeného cíle (gage / raking / boarding) */
    .tactics { margin-top: 5px; padding: 4px 5px; border: 1px solid #2b4a52; border-radius: 4px; background: rgba(20,40,46,.5); }
    .tactics .tac-row { display: grid; grid-template-columns: 72px 1fr; gap: 5px; align-items: center; font-size: 10px; padding: 1px 0; }
    .tactics .tac-row > span:first-child { color: #9fb8bf; }
    .tactics .ok { color: #6fd06a; }
    .tactics .bad { color: #e0805a; }

    #hud-bottom .obg { display: inline-flex; flex-wrap: wrap; gap: 4px; align-items: center;
      padding: 4px 6px; border: 1px solid #1c4a55; background: #07222bd0; margin-right: 6px; }
    .shot-desc { font-size: 10px; color: #8fbcc4; margin-left: 4px; }

    .logline { line-height: 1.35; }
    .logline .lt { color: #4a6b72; }
    .logline.comm { color: #d8e8ea; }
    .logline .portrait { width: 26px; height: 26px; border-radius: 3px; object-fit: cover;
      vertical-align: middle; margin-right: 5px; border: 1px solid #2a6b78; }
    .sp-gunner, .sp-lookout, .sp-mate, .sp-bosun, .sp-captain { color: #7fd0e0; }
    .sp-admiral { color: #9fe0ff; }
    .sp-enemy-captain, .sp-pirate, .sp-pirate-captain { color: #e0805a; }
    .sp-agent, .sp-castilian-admiral { color: #d88a5a; }
    .sp-port, .sp-governor { color: #d8c24f; }

    button { background: #0b2a33; color: #cfeef2; border: 1px solid #2a6b78; font-family: inherit;
      font-size: 12px; cursor: pointer; padding: 3px 9px; border-radius: 2px; }
    button:hover { background: #103b47; }
    button.active { background: #2a6b78; color: #eafcff; }
    button:disabled { opacity: .35; cursor: default; }

    /* overlaye */
    .overlay { position: absolute; inset: 0; background: #05161ccc; display: flex; align-items: center;
      justify-content: center; z-index: 20; padding: 20px; }
    .overlay .box { max-width: 640px; max-height: 88vh; overflow-y: auto; background: #0a2630;
      border: 1px solid #2a6b78; padding: 22px 26px; }
    .overlay h1 { color: #d8c24f; letter-spacing: 4px; margin: 0 0 10px; }
    .overlay h2 { color: #7fd0e0; margin: 12px 0 8px; }
    .overlay h2.win { color: #6fd06a; }
    .overlay h2.lose { color: #e0603a; }
    .brief { line-height: 1.5; margin: 8px 0; white-space: pre-wrap; }
    .brief.story { color: #a9c8ce; font-style: italic; }
    .hint { font-size: 11px; color: #6a8a90; margin: 10px 0; line-height: 1.5; }
    .brief-img, .menu-img { display: block; width: 100%; max-height: 260px; object-fit: cover;
      border: 1px solid #2a6b78; border-radius: 3px; margin: 0 0 12px; }
    .menu-img { max-height: 220px; }
    .mrow { margin: 6px 0; }
    .mrow button { font-size: 14px; }
    .mdesc { font-size: 11px; color: #7f97a0; margin: 2px 0 0 4px; }
    .score { margin: 10px 0; border: 1px solid #1c4a55; padding: 8px; }
    .score .stot { font-size: 15px; color: #d8c24f; margin-bottom: 4px; }
    .score .ok { color: #6fd06a; }
    .score .bad { color: #e0603a; }
    .dim { color: #6a8a90; }
    /* kampaňová mapa */
    .overlay .box.wide { max-width: 920px; }
    .cm-bar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin: 8px 0;
      padding: 8px 10px; border: 1px solid #1c4a55; background: #0b2a34; }
    .cm-bar b { color: #d8c24f; }
    .cm-bar button { margin-left: auto; }
    .cm-wrap { border: 1px solid #245a66; border-radius: 4px; overflow: hidden; margin: 6px 0;
      background: radial-gradient(120% 100% at 20% 100%, #123f4e 0%, #0c2c39 55%, #0a2531 100%); }
    .cm-map { display: block; width: 100%; height: auto; }
    .cm-isle { fill: #234b3a; stroke: #2f6b4e; stroke-width: 1.5; opacity: .55; }
    .cm-route { stroke-width: 3; stroke-dasharray: 7 6; fill: none; }
    .cm-route.done { stroke: #6fd06a; opacity: .8; stroke-dasharray: none; }
    .cm-route.open { stroke: #d8c24f; opacity: .7; }
    .cm-route.locked { stroke: #34606c; opacity: .5; }
    .cm-node { cursor: default; }
    .cm-node[data-mission] { cursor: pointer; }
    .cm-c { fill: #0c2c39; stroke: #34606c; stroke-width: 2.5; }
    .cm-node.open .cm-c { stroke: #d8c24f; fill: #14323d; }
    .cm-node.done .cm-c { stroke: #6fd06a; fill: #123a2c; }
    .cm-node[data-mission]:hover .cm-c { fill: #1c4a55; stroke: #7fd0e0; }
    .cm-num { fill: #cfe6ec; font-size: 17px; font-weight: bold; text-anchor: middle; }
    .cm-node.done .cm-num { fill: #6fd06a; }
    .cm-node.locked .cm-num { fill: #4c6b74; }
    .cm-title { fill: #9fb8bf; font-size: 12px; text-anchor: middle; }
    .cm-node.locked .cm-title { fill: #43626b; }
    .cm-you-i { font-size: 22px; text-anchor: middle; }
    .cm-you-t { fill: #d8c24f; font-size: 10px; text-anchor: middle; }
    /* loděnice */
    .sy-ship.active { border: 1px solid #6fd06a; padding: 6px 8px; background: #0d3226; }
    .sy-stats { margin: 3px 0 2px; }
    .sy-stat { display: inline-block; font-size: 10px; color: #8fb0b8; margin-right: 10px; }
    .sy-stat b { color: #cfe6ec; }
  </style>
</head>
<body>
  <div id="app">
    <div id="plot-container"><canvas id="plot"></canvas></div>
    <div id="topbar"></div>
    <div id="hud-left" class="hud"></div>
    <div id="hud-right" class="hud"></div>
    <div id="hud-bottom" class="hud"></div>
    <div id="hud-log"></div>
    <div id="navpad">
      <button data-nav="up" title="posun nahoru">▲</button>
      <button data-nav="left" title="posun vlevo">◀</button>
      <button data-nav="center" title="vycentrovat na loď">◎</button>
      <button data-nav="right" title="posun vpravo">▶</button>
      <button data-nav="down" title="posun dolů">▼</button>
      <button data-nav="in" title="přiblížit">＋</button>
      <button data-nav="out" title="oddálit">－</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
