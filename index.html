<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a2630" />
  <link rel="icon" type="image/png" href="/img/icon-192.png" />
  <link rel="apple-touch-icon" href="/img/icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Pirates</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0a2630; color: #cfeef2;
      font-family: "Consolas", "Menlo", monospace; overflow: hidden; touch-action: manipulation; }
    #app { position: relative; height: 100vh; height: 100dvh; }
    #plot-container { position: absolute; inset: 0; }
    #plot { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; display: block; }

    /* HUD vrstvy */
    #topbar { position: absolute; top: 0; left: 0; right: 0; padding: 5px 10px; z-index: 8;
      display: flex; gap: 16px; align-items: center; font-size: 13px;
      background: linear-gradient(#0a2630e0, #0a263000); pointer-events: none; }
    #topbar > * { pointer-events: auto; }
    .tb-time { color: #eafcff; min-width: 70px; }
    .tb-wind { color: #7fd0e0; }
    .tb-comp button { margin-right: 3px; }

    .hud { position: absolute; z-index: 6; display: flex; flex-direction: column; gap: 6px;
      font-size: 11px; pointer-events: none; }
    .hud > * { pointer-events: auto; }
    #hud-left { top: 34px; left: 8px; width: 250px; }
    #hud-right { top: 34px; right: 8px; width: 240px; }
    #hud-bottom { left: 8px; bottom: 8px; right: 260px; flex-direction: row; flex-wrap: wrap;
      align-items: flex-end; z-index: 7; }
    #hud-log { position: absolute; right: 8px; bottom: 8px; width: 240px; max-height: 34vh;
      overflow-y: auto; z-index: 6; display: flex; flex-direction: column; gap: 2px;
      font-size: 11px; pointer-events: auto; }

    /* navigační pad (posun mapy bez myši) */
    #navpad { position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      z-index: 7; display: grid; grid-template-columns: repeat(3, 34px); grid-auto-rows: 34px;
      gap: 4px; opacity: .85;
      grid-template-areas: ".  up  ." "left center right" ".  down  ." "zin . zout"; }
    #navpad button { padding: 0; font-size: 15px; line-height: 1; background: #07222bd8; }
    #navpad button[data-nav="up"] { grid-area: up; }
    #navpad button[data-nav="left"] { grid-area: left; }
    #navpad button[data-nav="center"] { grid-area: center; color: #7fd0e0; }
    #navpad button[data-nav="right"] { grid-area: right; }
    #navpad button[data-nav="down"] { grid-area: down; }
    #navpad button[data-nav="in"] { grid-area: zin; }
    #navpad button[data-nav="out"] { grid-area: zout; }
    @media (max-width: 720px) { #navpad { top: auto; bottom: 92px; transform: none; } }

    .panel { border: 1px solid #1c4a55; padding: 5px 7px; background: #07222bd0;
      backdrop-filter: blur(2px); }
    .panel h3 { margin: 0 0 4px 0; font-size: 11px; color: #d8c24f; text-transform: uppercase; }
    .row, .row2 { display: flex; justify-content: space-between; gap: 6px; margin: 1px 0; }
    .row2 { font-size: 11px; }
    .subs { display: grid; grid-template-columns: 1fr 1fr; gap: 1px 8px; margin: 4px 0; font-size: 10px; }
    .ship-img { display: block; width: 100%; max-height: 92px; object-fit: cover; object-position: center;
      border: 1px solid #1c4a55; border-radius: 2px; margin: 2px 0 4px; }
    .bar { display: inline-block; width: 70px; height: 8px; background: #0b2a33; border: 1px solid #1c4a55;
      vertical-align: middle; }
    .bar i { display: block; height: 100%; }
    .pos { margin-top: 4px; padding: 2px 4px; border: 1px solid #1c4a55; color: #cfeef2; }
    .pos.good { border-color: #4fd0e0; color: #9ff0ff; }
    .pos.nogo { border-color: #e0603a; color: #ffb090; }

    .ct { padding: 1px 0; }
    .ct.enemy { color: #e0805a; }
    .ct.neutral { color: #d8c24f; }
    .ct.player { color: #4fd0e0; }
    .obj { padding: 1px 0; }
    .obj.done { color: #6fd06a; }
    .obj.failed { color: #e0603a; }
    .hintline { margin: 3px 0; padding: 2px 4px; border-left: 2px solid #d8c24f; color: #d8c24f; font-size: 10px; }
    .hintline.ok { border-color: #6fd06a; color: #9ff0a0; }
    /* předpověď počasí */
    .fc .fc-row { display: grid; grid-template-columns: 54px 20px 48px 1fr; align-items: center; gap: 4px; padding: 1px 0; }
    .fc .fc-a { font-size: 15px; color: #7fd0e0; text-align: center; }
    .fc .fc-t { color: #9fb8bf; }
    .fc .ok { color: #6fd06a; }
    .fc .bad { color: #e0805a; }
    .fc-hint { font-size: 9px; color: #6a8a90; margin-top: 3px; line-height: 1.3; }
    /* taktický telegraf u zaměřeného cíle (gage / raking / boarding) */
    .tactics { margin-top: 5px; padding: 4px 5px; border: 1px solid #2b4a52; border-radius: 4px; background: rgba(20,40,46,.5); }
    .tactics .tac-row { display: grid; grid-template-columns: 72px 1fr; gap: 5px; align-items: center; font-size: 10px; padding: 1px 0; }
    .tactics .tac-row > span:first-child { color: #9fb8bf; }
    .tactics .ok { color: #6fd06a; }
    .tactics .bad { color: #e0805a; }

    #hud-bottom .obg { display: inline-flex; flex-wrap: wrap; gap: 4px; align-items: center;
      padding: 4px 6px; border: 1px solid #1c4a55; background: #07222bd0; margin-right: 6px; }
    .shot-desc { font-size: 10px; color: #8fbcc4; margin-left: 4px; }

    .logline { line-height: 1.35; }
    .logline .lt { color: #4a6b72; }
    .logline.comm { color: #d8e8ea; }
    .logline .portrait { width: 26px; height: 26px; border-radius: 3px; object-fit: cover;
      vertical-align: middle; margin-right: 5px; border: 1px solid #2a6b78; }
    .sp-gunner, .sp-lookout, .sp-mate, .sp-bosun, .sp-captain { color: #7fd0e0; }
    .sp-admiral { color: #9fe0ff; }
    .sp-enemy-captain, .sp-pirate, .sp-pirate-captain { color: #e0805a; }
    .sp-agent, .sp-castilian-admiral { color: #d88a5a; }
    .sp-port, .sp-governor { color: #d8c24f; }

    button { background: #0b2a33; color: #cfeef2; border: 1px solid #2a6b78; font-family: inherit;
      font-size: 12px; cursor: pointer; padding: 3px 9px; border-radius: 2px; }
    button:hover { background: #103b47; }
    button.active { background: #2a6b78; color: #eafcff; }
    button:disabled { opacity: .35; cursor: default; }

    /* overlaye */
    .overlay { position: absolute; inset: 0; background: #05161ccc; display: flex; align-items: center;
      justify-content: center; z-index: 20; padding: 20px; }
    .overlay .box { max-width: 640px; max-height: 88vh; overflow-y: auto; background: #0a2630;
      border: 1px solid #2a6b78; padding: 22px 26px; }
    .overlay h1 { color: #d8c24f; letter-spacing: 4px; margin: 0 0 10px; }
    .overlay h2 { color: #7fd0e0; margin: 12px 0 8px; }
    .overlay h2.win { color: #6fd06a; }
    .overlay h2.lose { color: #e0603a; }
    .brief { line-height: 1.5; margin: 8px 0; white-space: pre-wrap; }
    .brief.story { color: #a9c8ce; font-style: italic; }
    .hint { font-size: 11px; color: #6a8a90; margin: 10px 0; line-height: 1.5; }
    .brief-img, .menu-img { display: block; width: 100%; max-height: 260px; object-fit: cover;
      border: 1px solid #2a6b78; border-radius: 3px; margin: 0 0 12px; }
    .menu-img { max-height: 220px; }
    .mrow { margin: 6px 0; }
    .mrow button { font-size: 14px; }
    .mdesc { font-size: 11px; color: #7f97a0; margin: 2px 0 0 4px; }
    .score { margin: 10px 0; border: 1px solid #1c4a55; padding: 8px; }
    .score .stot { font-size: 15px; color: #d8c24f; margin-bottom: 4px; }
    .score .ok { color: #6fd06a; }
    .score .bad { color: #e0603a; }
    .dim { color: #6a8a90; }
    /* kampaňová mapa */
    .overlay .box.wide { max-width: 920px; }
    .cm-bar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin: 8px 0;
      padding: 8px 10px; border: 1px solid #1c4a55; background: #0b2a34; }
    .cm-bar b { color: #d8c24f; }
    .cm-bar button { margin-left: auto; }
    .cm-wrap { border: 1px solid #245a66; border-radius: 4px; overflow: hidden; margin: 6px 0;
      background: radial-gradient(120% 100% at 20% 100%, #123f4e 0%, #0c2c39 55%, #0a2531 100%); }
    .cm-map { display: block; width: 100%; height: auto; }
    .cm-isle { fill: #234b3a; stroke: #2f6b4e; stroke-width: 1.5; opacity: .55; }
    .cm-route { stroke-width: 3; stroke-dasharray: 7 6; fill: none; }
    .cm-route.done { stroke: #6fd06a; opacity: .8; stroke-dasharray: none; }
    .cm-route.open { stroke: #d8c24f; opacity: .7; }
    .cm-route.locked { stroke: #34606c; opacity: .5; }
    .cm-node { cursor: default; }
    .cm-node[data-mission] { cursor: pointer; }
    .cm-c { fill: #0c2c39; stroke: #34606c; stroke-width: 2.5; }
    .cm-node.open .cm-c { stroke: #d8c24f; fill: #14323d; }
    .cm-node.done .cm-c { stroke: #6fd06a; fill: #123a2c; }
    .cm-node[data-mission]:hover .cm-c { fill: #1c4a55; stroke: #7fd0e0; }
    .cm-num { fill: #cfe6ec; font-size: 17px; font-weight: bold; text-anchor: middle; }
    .cm-node.done .cm-num { fill: #6fd06a; }
    .cm-node.locked .cm-num { fill: #4c6b74; }
    .cm-title { fill: #9fb8bf; font-size: 12px; text-anchor: middle; }
    .cm-node.locked .cm-title { fill: #43626b; }
    /* volitelné odbočky (zlaté) */
    .cm-route.opt { stroke-dasharray: 3 5; opacity: .6; }
    .cm-node.opt .cm-c { stroke: #d8a24f; }
    .cm-node.opt.open .cm-c { stroke: #e8c874; fill: #2e2410; }
    .cm-node.opt .cm-num { fill: #e8c874; }
    .cm-node.opt.done .cm-c { stroke: #6fd06a; }
    /* placené uzly (za paywallem) — zlatý zámek, dostupné ke koupi */
    .cm-node.paid .cm-c { stroke: #d8b24f; fill: #241c0e; stroke-dasharray: 4 3; }
    .cm-node.paid .cm-num { fill: #e8c874; font-size: 14px; }
    .cm-node.paid .cm-title { fill: #b79a52; }
    .cm-route.paid { stroke: #6a5a2a; stroke-dasharray: 4 4; opacity: .5; }
    .cm-buy { background: linear-gradient(#3a2c0c, #241c0e); border: 1px solid #d8b24f; color: #f0d890; }
    .cm-buy:hover { background: #4a3a12; }
    /* store overlay */
    .store-price { font-size: 26px; color: #f0d890; font-weight: 700; margin: 10px 0 6px; }
    .store-perks { list-style: none; padding: 0; margin: 8px 0 14px; }
    .store-perks li { color: #cfe6ec; font-size: 13px; padding: 4px 0 4px 22px; position: relative; }
    .store-perks li::before { content: "⚓"; position: absolute; left: 0; color: #6fd06a; }
    .store-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    #btn-buy { background: linear-gradient(#3a2c0c, #241c0e); border: 1px solid #d8b24f; color: #f0d890; font-weight: 600; }
    .store-msg { min-height: 18px; font-size: 12px; margin: 6px 0; }
    .store-msg.ok { color: #6fd06a; } .store-msg.bad { color: #e0603a; }
    .cm-locked-feat { opacity: .8; }
    /* skirmish setup */
    .sk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 7px; margin: 6px 0 4px; }
    .sk-ship { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; padding: 8px 10px;
      background: #0c2c39; border: 1px solid #34606c; border-radius: 7px; color: #cfe6ec; text-align: left; }
    .sk-ship b { font-size: 13px; } .sk-s { font-size: 10px; color: #8fb0b8; }
    .sk-ship.on { background: #14323d; border-color: #d8c24f; }
    .sk-ship:hover { border-color: #7fd0e0; }
    .sk-row { display: flex; flex-wrap: wrap; gap: 7px; margin: 6px 0 4px; }
    .sk-opt { min-width: 54px; padding: 7px 12px; background: #0c2c39; border: 1px solid #34606c;
      border-radius: 6px; color: #cfe6ec; }
    .sk-opt.on { background: #2a6b78; border-color: #4fd0e0; color: #fff; }
    .sk-fight { background: linear-gradient(#78221a, #4a1410); border: 1px solid #e0603a; color: #ffd9c0; font-weight: 600; }
    .sk-fight:hover { background: #8a2a1e; }
    .cm-you-i { font-size: 22px; text-anchor: middle; }
    .cm-you-t { fill: #d8c24f; font-size: 10px; text-anchor: middle; }
    /* loděnice */
    .sy-ship.active { border: 1px solid #6fd06a; padding: 6px 8px; background: #0d3226; }
    .sy-stats { margin: 3px 0 2px; }
    .sy-stat { display: inline-block; font-size: 10px; color: #8fb0b8; margin-right: 10px; }
    .sy-stat b { color: #cfe6ec; }
    /* oprava lodi (kondice) */
    .cond-row { display: grid; grid-template-columns: 68px 1fr; gap: 6px; align-items: center; font-size: 11px; color: #9fb8bf; padding: 1px 0; }
    .cond-bar { height: 7px; background: #10242b; border-radius: 3px; overflow: hidden; }
    .cond-bar i { display: block; height: 100%; }

    /* ============ tablet / iPad: bohaté panely, ale touch-friendly ============ */
    /* větší dotykové terče, vzdušnější panely, výraznější navpad; aktivní s .tablet */
    .tablet button { padding: 8px 14px; font-size: 13px; -webkit-tap-highlight-color: transparent; }
    .tablet #topbar { font-size: 14px; gap: 18px; }
    .tablet .tb-comp button, .tablet #topbar button { min-height: 38px; }
    .tablet .panel { font-size: 12px; padding: 7px 9px; }
    .tablet #hud-left { width: 284px; } .tablet #hud-right { width: 274px; }
    .tablet #hud-log { width: 274px; font-size: 12px; }
    .tablet #hud-bottom { right: 288px; gap: 8px; }
    .tablet #hud-bottom button { min-height: 46px; }
    .tablet #navpad { grid-template-columns: repeat(3, 50px); grid-auto-rows: 50px; gap: 6px; opacity: .92; }
    .tablet #navpad button { font-size: 22px; }
    .tablet .mrow button, .tablet .overlay button, .tablet .cm-bar button { min-height: 46px; }
    .tablet #r-toggle { min-height: 38px; }

    /* ================= mobilní UX (aktivní jen s .mobile) ================= */
    #mhud { display: none; }
    .mobile #topbar, .mobile #hud-left, .mobile #hud-right, .mobile #hud-bottom,
    .mobile #hud-log, .mobile #navpad, .mobile #r-toggle { display: none !important; }
    .mobile #mhud { display: block; position: fixed; inset: 0; z-index: 15; pointer-events: none;
      font: 12px/1.2 ui-monospace, monospace; }
    .mobile #mhud button { pointer-events: auto; -webkit-tap-highlight-color: transparent; }
    /* horní lišta */
    #mh-top { position: absolute; top: calc(env(safe-area-inset-top, 0px) + 5px); left: 7px; right: 7px;
      display: flex; align-items: center; gap: 7px; pointer-events: none; }
    #mh-top > * { pointer-events: auto; }
    .mh-play { width: 44px; height: 34px; font-size: 15px; background: rgba(12,40,48,.85);
      border: 1px solid #2b4a52; border-radius: 7px; color: #cfe6ec; }
    .mh-time { color: #cfe6ec; font-size: 13px; }
    .mh-spd { display: inline-flex; gap: 3px; }
    .mh-sp { width: 30px; height: 28px; font-size: 11px; background: rgba(12,40,48,.85);
      border: 1px solid #2b4a52; border-radius: 5px; color: #9fb8bf; }
    .mh-sp.on { background: #2a6b78; color: #fff; border-color: #4fd0e0; }
    .mh-wind { display: inline-flex; align-items: center; gap: 2px; }
    .mh-wind-c { fill: rgba(10,40,50,.6); stroke: #3a6b78; stroke-width: 1.5; }
    .mh-wind-a { fill: #7fd0e0; }
    .mh-wind-kn { color: #9fb8bf; font-size: 11px; }
    .mh-objs { margin-left: auto; max-width: 42%; text-align: right; }
    .mh-obj { font-size: 9.5px; color: #9fb8bf; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mh-obj.done { color: #6fd06a; } .mh-obj.failed { color: #e0603a; }
    /* vlastní loď — barevné pipy (top-left) */
    #mh-status { position: absolute; top: calc(env(safe-area-inset-top, 0px) + 46px); left: 9px;
      display: flex; gap: 5px; pointer-events: auto; padding: 2px 3px; border-radius: 6px; }
    #mh-status:active { background: rgba(20,60,70,.4); }
    .mh-pip { display: flex; flex-direction: column; align-items: center; }
    .mh-pipbar { width: 8px; height: 40px; background: rgba(10,30,36,.65); border-radius: 3px;
      display: flex; align-items: flex-end; overflow: hidden; }
    .mh-pipbar i { width: 100%; display: block; }
    .mh-pipi { font-size: 11px; margin-top: 1px; }
    /* cíl (nad lištou akcí) */
    #mh-target { position: absolute; left: 8px; right: 8px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 80px);
      display: flex; align-items: center; gap: 10px; pointer-events: none; }
    .mh-t-main { flex: 1; background: rgba(10,30,36,.72); border: 1px solid #2b4a52; border-radius: 6px; padding: 5px 8px; pointer-events: auto; }
    .mh-t-main:active { border-color: #4fd0e0; }
    .mh-t-name { color: #e0a0a0; font-size: 12px; margin-bottom: 3px; }
    .mh-t-bar { height: 6px; background: #2a1414; border-radius: 3px; overflow: hidden; }
    .mh-t-bar i { display: block; height: 100%; background: #e0603a; }
    .mh-t-lost { color: #6a8a90; font-size: 11px; font-style: italic; }
    .mh-t-ics { margin-top: 3px; }
    .mh-t-ic { font-size: 14px; opacity: .3; margin-right: 6px; }
    .mh-t-ic.on { opacity: 1; } .mh-t-ic.bad { opacity: .55; }
    .mh-ring { position: relative; width: 34px; height: 34px; }
    .mh-ring-bg { fill: none; stroke: #2a3a40; stroke-width: 4; }
    .mh-ring-fg { fill: none; stroke: #d8b24f; stroke-width: 4; stroke-linecap: round; }
    .mh-ring.near .mh-ring-fg { stroke: #6fd06a; }
    .mh-ring-t { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: 9px; color: #cfe6ec; }
    /* palcová lišta akcí */
    #mh-actions { position: absolute; left: 0; right: 0; bottom: 0; display: flex; gap: 4px; justify-content: center;
      padding: 6px 6px calc(env(safe-area-inset-bottom, 0px) + 6px); pointer-events: none; }
    .mh-btn { pointer-events: auto; flex: 1; max-width: 76px; min-height: 54px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px; background: rgba(12,40,48,.85);
      border: 1px solid #2b4a52; border-radius: 8px; color: #cfe6ec; }
    .mh-btn.on { background: #2a6b78; border-color: #4fd0e0; }
    .mh-btn[disabled] { opacity: .35; }
    .mh-bi { font-size: 20px; } .mh-bl { font-size: 9px; color: #9fb8bf; }
    .mh-btn[data-act="fire"] { background: rgba(120,34,22,.85); border-color: #e0603a; }
    .mh-btn[data-act="fire"] .mh-bi { font-size: 24px; }
    .mh-btn[data-act="fire"][disabled] { background: rgba(40,40,46,.55); border-color: #2b4a52; }
    /* bubliny (nahrazují log) */
    #mh-toasts { position: absolute; top: calc(env(safe-area-inset-top, 0px) + 94px); left: 50%;
      transform: translateX(-50%); display: flex; flex-direction: column; gap: 4px; align-items: center;
      width: 88%; pointer-events: none; }
    .mh-toast { background: rgba(10,30,36,.92); border-left: 3px solid #7fd0e0; color: #dfeaee; font-size: 11.5px;
      padding: 5px 9px; border-radius: 4px; max-width: 100%; transition: opacity .5s; text-align: center; }
    .mh-toast.comm { border-left-color: #d8c24f; }
    /* detailní list (bottom sheet) s plnými čísly */
    #mh-sheet { position: absolute; inset: 0; display: none; z-index: 30; }
    #mh-sheet.open { display: block; pointer-events: auto; }
    .mh-sh-bd { position: absolute; inset: 0; background: rgba(0,0,0,.45); }
    .mh-sh-card { position: absolute; left: 0; right: 0; bottom: 0;
      background: rgba(9,26,32,.98); border-top: 1px solid #2b4a52; border-radius: 14px 14px 0 0;
      padding: 14px 16px calc(env(safe-area-inset-bottom, 0px) + 14px);
      max-height: 74%; overflow-y: auto; animation: mh-sh-in .16s ease-out; }
    @keyframes mh-sh-in { from { transform: translateY(30px); opacity: .4; } to { transform: none; opacity: 1; } }
    .mh-sh-h { color: #e6eef1; font-size: 15px; font-weight: 600; margin-bottom: 10px; }
    .mh-sh-note { color: #8aa2a8; font-size: 12px; font-style: italic; margin-bottom: 8px; }
    .mh-sh-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 7px; }
    .mh-sh-l { color: #9fb8bf; font-size: 12px; }
    .mh-sh-v { color: #e6eef1; font-size: 13px; font-variant-numeric: tabular-nums; }
